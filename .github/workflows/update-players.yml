name: Update Player Data
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      player_ids:
        description: "Comma-separated profileIds to update (leave empty for all)"
        required: false
        default: ""
      pages:
        description: "Pages to fetch per player (default 5)"
        required: false
        default: "5"
      dry_run:
        description: "Fetch but don't commit (true/false)"
        required: false
        default: "false"
      repair:
        description: "Clear existing data before re-fetching, fixes null civ/won (true/false)"
        required: false
        default: "false"
      spider:
        description: "Discover new players from match history (true/false)"
        required: false
        default: "true"
      spider_max_new:
        description: "Max new players to add per spider run (default 50)"
        required: false
        default: "50"
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install requests
      - name: Run API test
        id: api_test
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.parse, sys
          url = "https://data.aoe2companion.com/api/matches?" + urllib.parse.urlencode({"profile_ids": 13648083, "page": 1})
          req = urllib.request.Request(url, headers={"User-Agent": "AoE2DataPipeline/1.0"})
          resp = urllib.request.urlopen(req, timeout=20)
          data = json.loads(resp.read().decode())
          matches = data["matches"] if isinstance(data, dict) else data
          m = matches[0]
          print("API reachable — match keys:", sorted(m.keys()))
          EOF
      - name: Migrate to subfolders (safe to run multiple times)
        run: python3 migrate_to_subfolders.py
      - name: Update player data
        id: update
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.player_ids }}" ]; then
            ARGS="$ARGS --players ${{ github.event.inputs.player_ids }}"
          fi
          if [ -n "${{ github.event.inputs.pages }}" ]; then
            ARGS="$ARGS --pages ${{ github.event.inputs.pages }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.repair }}" = "true" ]; then
            ARGS="$ARGS --repair"
          fi
          python3 update_players.py $ARGS
      - name: Spider new players
        if: ${{ github.event_name == 'schedule' || github.event.inputs.spider != 'false' }}
        run: |
          ARGS="--max-new ${{ github.event.inputs.spider_max_new || '50' }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 spider.py $ARGS
      - name: Build aggregate
        run: python3 build_aggregate.py
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ players.json
          git diff --staged --quiet || git commit -m "chore: auto-update player data $(date -u '+%Y-%m-%d')"
          git pull --rebase && git push || echo "Nothing to push"
