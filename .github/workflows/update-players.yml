name: Update Player Data
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      player_id:
        description: "Single profileId to update (leave empty for all)"
        required: false
        default: ""
      pages:
        description: "Pages to fetch per player (default 5)"
        required: false
        default: "5"
      dry_run:
        description: "Fetch but don't commit (true/false)"
        required: false
        default: "false"
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run API test
        id: api_test
        run: |
          python3 - <<'EOF'
          import json, urllib.request, urllib.parse, sys
          url = "https://data.aoe2companion.com/api/matches?" + urllib.parse.urlencode({"profile_ids": 13648083, "page": 1})
          req = urllib.request.Request(url, headers={"User-Agent": "AoE2DataPipeline/1.0"})
          resp = urllib.request.urlopen(req, timeout=20)
          data = json.loads(resp.read().decode())
          matches = data["matches"] if isinstance(data, dict) else data
          m = matches[0]
          print("API reachable — match keys:", sorted(m.keys()))
          print("Player keys:", sorted(m["players"][0].keys()) if m.get("players") else "no players")
          print("First match:", json.dumps(m, indent=2)[:800])
          EOF
      - name: Update player data
        id: update
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.player_id }}" ]; then
            ARGS="$ARGS --player ${{ github.event.inputs.player_id }}"
          fi
          if [ -n "${{ github.event.inputs.pages }}" ]; then
            ARGS="$ARGS --pages ${{ github.event.inputs.pages }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 update_players.py $ARGS
      - name: Commit and push if changed
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ players.json
          git commit -m "chore: auto-update player data $(date -u '+%Y-%m-%d')"
          git push
