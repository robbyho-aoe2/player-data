name: Fix Groups
on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fix pro group tags
        run: python3 fix_groups.py

      - name: Build aggregate
        run: python3 build_aggregate.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.json data/
          git diff --staged --quiet || git commit -m "fix: correct group tags from subfolder state"
          git pull --rebase && git push || echo "Nothing to push"
