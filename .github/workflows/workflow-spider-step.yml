# ── Insert this block in update-players.yml ──────────────────────────────────
#
# Placement: AFTER the "Update players" step, BEFORE the "Build aggregate" step.
#
# The spider discovers new players from existing match history and appends them
# to players.json.  They'll be picked up by the *next* weekly update_players run.
# For backfill (1000 pages), trigger manually via workflow_dispatch with their IDs.
#
# ─────────────────────────────────────────────────────────────────────────────

# Add these inputs under workflow_dispatch.inputs (alongside existing ones):
# ┌─────────────────────────────────────────────────────────────────────────┐
      spider:
        description: 'Run spider to discover new players'
        required: false
        default: 'true'
        type: boolean
      spider_max_new:
        description: 'Max new players to add per spider run'
        required: false
        default: '50'
# └─────────────────────────────────────────────────────────────────────────┘


# Add this step between "Update players" and "Build aggregate":
# ┌─────────────────────────────────────────────────────────────────────────┐
      - name: Spider new players
        # On cron: always run. On manual dispatch: only if spider=true (default).
        if: ${{ github.event_name == 'schedule' || inputs.spider == 'true' }}
        run: |
          python spider.py \
            --max-new ${{ inputs.spider_max_new || '50' }} \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
# └─────────────────────────────────────────────────────────────────────────┘


# ── Full workflow context (for reference) ─────────────────────────────────────
#
# Steps order after this change:
#   1. API test
#   2. Migrate (idempotent)
#   3. Update players          ← fetches/merges match data for tracked players
#   4. Spider new players      ← NEW: discovers + appends new players.json entries
#   5. Build aggregate         ← reads all player files, writes aggregate.json
#   6. Commit                  ← git add players.json data/ → commit → push
#
# The spider runs AFTER update_players so the match files it reads are fresh.
# It runs BEFORE build_aggregate so newly added players are counted in the
# playerCounts totals (though they'll have no match data until next week).
#
# ─────────────────────────────────────────────────────────────────────────────
