name: Update Player Data

"on":
  schedule:
    # Every Monday at 06:00 UTC (02:00 EDT / midnight PDT)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      player_id:
        description: "Single profileId to update (leave empty for all)"
        required: false
        default: ""
      pages:
        description: "Pages to fetch per player (default 5 = 100 matches)"
        required: false
        default: "5"
      dry_run:
        description: "Fetch but don't commit (true/false)"
        required: false
        default: "false"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the commit

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No external deps — stdlib only (urllib, json, pathlib)
      # If you later add requests/httpx, pip install here:
      # - run: pip install requests

      - name: Run API test (fail fast if API unreachable)
        id: api_test
        run: python3 test_api.py
        # If this step fails, the pipeline stops before writing any data.
        # On first run, check the output carefully to confirm all field
        # names are correct before letting the weekly cron run.

      - name: Update player data
        id: update
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.player_id }}" ]; then
            ARGS="$ARGS --player ${{ github.event.inputs.player_id }}"
          fi
          if [ -n "${{ github.event.inputs.pages }}" ]; then
            ARGS="$ARGS --pages ${{ github.event.inputs.pages }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python3 update_players.py $ARGS

      - name: Commit and push if changed
        if: steps.update.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ players.json
          git commit -m "chore: auto-update player data $(date -u '+%Y-%m-%d')"
          git push
